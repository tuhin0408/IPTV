name: Auto Update TF Playlists

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  update-playlists:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the updated files back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Update Script
        run: python update_playlist.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist/TF/TF-1.m3u8 playlist/TF/TF-6.m3u8
          
          # Only commit and push if there are actually changes to avoid failing the workflow
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update TF-1 and TF-6 playlist links"
            git push
          else
            echo "No changes to commit."
          fi
